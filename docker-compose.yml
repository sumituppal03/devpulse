services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: devpulse-postgres
    environment:
      POSTGRES_DB: devpulse
      POSTGRES_USER: sumit
      POSTGRES_PASSWORD: sumit123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sumit -d devpulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: devpulse-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: